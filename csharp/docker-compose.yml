services:
  # Build the driver (Release mode)
  build:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: echo "Build complete — driver compiled in Release mode."

  # Run unit tests (no credentials needed)
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    # Override entrypoint args to pass extra flags if needed:
    #   docker compose run test --filter "FullyQualifiedName~BigQueryConnectionTests"

  # Interactive shell for development / debugging
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    stdin_open: true
    tty: true
    entrypoint: /bin/bash
    volumes:
      # Mount source for live editing
      - ./src:/repo/csharp/src
      - ./test:/repo/csharp/test
    environment:
      - DOTNET_NOLOGO=1
      - DOTNET_CLI_TELEMETRY_OPTOUT=1

  # Run integration tests (requires BigQuery credentials)
  # Reads GOOGLE_APPLICATION_CREDENTIALS and BIGQUERY_TEST_CONFIG_FILE from .env
  integration-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    env_file:
      - path: .env
        required: false
    entrypoint:
      - dotnet
      - test
      - test/AdbcDrivers.BigQuery.Tests.csproj
      - --no-build
      - -c
      - Debug
      - --logger
      - console;verbosity=detailed
    environment:
      - BIGQUERY_TEST_CONFIG_FILE=/config/bigqueryconfig.json
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service-account.json
    volumes:
      - ${BIGQUERY_TEST_CONFIG_FILE:-./secrets/bigqueryconfig.json}:/config/bigqueryconfig.json:ro
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./secrets/service-account.json}:/secrets/service-account.json:ro

  # Run performance tests (requires BigQuery credentials + perf config)
  # Reads BIGQUERY_PERF_CONFIG_FILE from .env
  perf-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: perf
    env_file:
      - path: .env
        required: false
    environment:
      - BIGQUERY_PERF_CONFIG_FILE=/config/perfconfig.json
    volumes:
      - ${BIGQUERY_PERF_CONFIG_FILE:-./secrets/perfconfig.json}:/config/perfconfig.json:ro
